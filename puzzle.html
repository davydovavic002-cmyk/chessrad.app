<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневная тренировка</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --timer-color: #ff4757;
            --progress-bg: #e0e0e0;
            --progress-fill: #2ecc71;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Главный контейнер в две колонки */
        .main-container {
            display: grid;
            grid-template-columns: 600px 350px; /* Фиксируем ширину доски и панели */
            gap: 30px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 1000px;
            width: 95%;
        }

        /* Колонка с доской */
        .game-column {
            width: 100%;
        }

        #board {
            width: 100%; /* Доска займет все 600px колонки */
        }

        /* Правая панель */
        .controls-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .timer-box {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--timer-color);
            text-align: center;
            margin-bottom: 20px;
        }

        .progress-container {
            width: 100%;
            height: 12px;
            background: var(--progress-bg);
            border-radius: 6px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--progress-fill);
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .streak-badge {
            text-align: center;
            background: linear-gradient(45deg, #ff9f43, #ff6b6b);
            color: white;
            padding: 10px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .status-text {
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
            min-height: 24px;
            color: #2d3436;
        }

        /* Кнопки */
        button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .btn-next {
            background: #2ecc71;
            color: white;
        }

        .btn-next:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .btn-back {
            background: #dfe6e9;
            color: #636e72;
        }

        .description-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            color: #636e72;
            line-height: 1.4;
            margin-top: 10px;
        }

        /* Адаптив для мобилок */
        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
                padding: 15px;
            }
            .game-column {
                max-width: 500px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="game-column">
            <div id="board"></div>
        </div>


<div class="controls-panel">
            <div class="streak-badge" id="streak-info">🔥 Загрузка...</div>

            <div class="timer-box" id="timer">01:00</div>

            <div class="progress-container">
                <div id="progress-fill"></div>
            </div>

            <div id="status" class="status-text">Готовы к тренировке?</div>

            <button class="btn-next" id="action-btn">Начать тренировку</button>


            <button class="btn-back" onclick="location.href='/lobby'">В лобби</button>

            <div id="description" class="description-box">
                Решите 10 задач подряд. Каждая верная задача продвигает вас по уровню и сохраняет ваш стрик.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/puzzle.js"></script>
</body>
</html>
