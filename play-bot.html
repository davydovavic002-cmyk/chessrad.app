<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Битва за стрик - ChessRad</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { background: #1a1a1a; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .game-container { text-align: center; width: 400px; }
        #myBoard { width: 400px; margin: 20px auto; border: 4px solid #3d3d3d; border-radius: 8px; }
        .status-panel { background: #2d2d2d; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .badge-restore { background: #ff4757; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="badge-restore">🔥 РЕЖИМ ВОССТАНОВЛЕНИЯ СТРИКА</div>
    <h2>Победи бота, чтобы вернуть серию!</h2>
    <div id="myBoard"></div>
    <div class="status-panel">
        <p id="status">Загрузка игры...</p>
    </div>
</div>

<script>
    /* --- LOZZA ENGINE CODE START --- */
    function Lozza() {
        this.piece_values = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 20000 };
        this.on_move = function(fen, time) {
            var game = new Chess(fen);
            var moves = game.moves({ verbose: true });
            if (moves.length === 0) return null;

            // Простейшая оценка: ищем лучший захват или случайный ход
            moves.sort(function(a, b) {
                var scoreA = 0;
                var scoreB = 0;
                if (a.captured) scoreA = 10;
                if (b.captured) scoreB = 10;
                return scoreB - scoreA;
            });

            var move = moves[Math.floor(Math.random() * Math.min(moves.length, 3))];
            return move.from + move.to;
        };
    }
    /* --- LOZZA ENGINE CODE END --- */

    var board = null;
    var game = new Chess();
    var engine = new Lozza();
    var $status = $('#status');

    function onDragStart (source, piece, position, orientation) {
        if (game.game_over()) return false;
        if (piece.search(/^b/) !== -1) return false;
    }

    function makeBotMove() {
        if (game.game_over()) return;
        var bestMove = engine.on_move(game.fen(), 500);
        if (bestMove) {
            game.move({
                from: bestMove.substring(0, 2),
                to: bestMove.substring(2, 4),
                promotion: 'q'
            });
            board.position(game.fen());
            updateStatus();
        }
    }

    function onDrop (source, target) {
        var move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        updateStatus();
        window.setTimeout(makeBotMove, 250);
    }

    function onSnapEnd () {
        board.position(game.fen());
    }

    async function updateStatus() {
        var status = '';
        var moveColor = (game.turn() === 'b') ? 'Черные' : 'Белые';

        if (game.in_checkmate()) {
            if (game.turn() === 'b') {
                handleWin();
            } else {
                Swal.fire('Поражение', 'Бот оказался сильнее!', 'error').then(() => location.reload());
            }
        } else if (game.in_draw()) {
            Swal.fire('Ничья', 'Нужна только победа!', 'info').then(() => location.reload());
        } else {
            status = moveColor + ' ходят' + (game.in_check() ? ', ШАХ!' : '');
            $status.html(status);
        }
    }


async function handleWin() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('mode') === 'restore_streak') {
        try {
            const res = await fetch('/api/puzzle/restore-streak', { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                Swal.fire('Победа!', 'Твой стрик успешно восстановлен! 🔥', 'success')
                    .then(() => {
                        // Если открыто в iframe — шлем сигнал, иначе редирект
                        if (window.parent !== window) {
                            window.parent.postMessage({ type: 'STREAK_RESTORED' }, '*');
                        } else {
                            window.location.href = '/lobby.html';
                        }
                    });
            }
        } catch (e) {
            Swal.fire('Ошибка', 'Не удалось восстановить стрик.', 'error');
        }
    } else {
        Swal.fire('Победа!', 'Отличная игра!', 'success').then(() => {
             if (window.parent !== window) {
                window.parent.postMessage({ type: 'STREAK_RESTORED' }, '*');
             } else {
                window.location.href = '/lobby.html';
             }
        });
    }
}

    var config = {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
    };
    board = Chessboard('myBoard', config);
    $status.html('Твой ход (Белые)');
</script>
</body>
</html>
